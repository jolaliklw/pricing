<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JL</title>
    <link rel="shortcut icon" href="#" type="image/x-icon" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="btn-open-modal-wrap">
        <button class="btn-open-modal"><div class="tiga-titik"></div></button>
      </div>

      <div id="show-harga">
        <h2>
          <span class="style-currency">Rp</span>
          <span class="nominal">0</span>
        </h2>
      </div>

      <div class="input-harga">
        <label for="harga">
          <span>Harga/gr</span>
          <input
            type="text"
            pattern="\d*"
            name="harga"
            id="harga"
            maxlength="11"
            placeholder="Rp"
            value=""
            pattern="[0-9]*"
            inputmode="numeric"
            required
          />
        </label>
      </div>

      <div class="input-berat">
        <label for="berat">
          <span>Berat</span>
          <input
            type="number"
            name="berat"
            id="berat"
            value=""
            step="0.01"
            min="0.01"
            placeholder="0.00"
            pattern="[0-9]*"
            inputmode="numeric"
          />
        </label>
      </div>

      <div class="short-info">
        <p></p>
      </div>

      <div class="setting-modal">
        <div class="setting-form">
          <div class="btn-close-wrap">
            <button class="btn-close-modal"></button>
          </div>

          <form>
            <label for="platform">Platform</label>
            <select id="platform" disabled>
              <option selected disabled>Choose a platform</option>
              <option value="S">Shopee</option>
              <option value="T">Tiktok</option>
            </select>

            <label for="set-ppn">Ppn</label>
            <input
              type="number"
              name="set-ppn"
              id="set-ppn"
              pattern="[0-9]*"
              inputmode="numeric"
              step="0.1"
              min="0"
            />
            <label for="set-extra">Additional Cost</label>
            <input
              type="number"
              name="set-extra"
              id="set-extra"
              pattern="[0-9]*"
              inputmode="numeric"
              min="0"
              step="1000"
            />
          </form>

          <button class="btn-save">Save</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
